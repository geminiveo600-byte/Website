<!doctype html><html lang='id'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<style>

:root{--bg:#0f172a;--box:#1e293b;--input:#334155;--text:#fff;}
.light{--bg:#f8fafc;--box:#fff;--input:#e5e7eb;--text:#111827;}
.mode-btn{position:fixed;z-index:1002;z-index:1002;top:16px;right:16px;width:42px;height:42px;border-radius:50%;background:var(--input);color:var(--text);display:flex;justify-content:center;align-items:center;cursor:pointer;font-size:20px}

h2{
    text-align:center;
    margin-bottom:20px;
    font-size:38px;
    font-weight:bold;
    background:linear-gradient(90deg,#ff0000,#ff9900,#ffff00,#00ff00,#00ccff,#0000ff,#cc00ff,#ff0000);
    background-size:300% auto;
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:rainbow 3s linear infinite;
}

@keyframes rainbow{
    to{
        background-position:300% center;
    }
}

body{background-color:var(--bg);color:var(--text);font-family:Arial;max-width:460px;margin:auto;padding:16px;background-repeat:no-repeat;background-position:center;background-size:cover;background-attachment:fixed}
.box{background:var(--box);padding:16px;border-radius:14px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}input{padding:12px;border:0;border-radius:8px;background:var(--input);color:var(--text);width:100%;box-sizing:border-box}
.big{width:100%;padding:15px;border:0;border-radius:10px;background:#0ea5e9;color:#fff;font-size:18px;margin:12px 0}.row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.row button,.del{padding:12px;border:0;border-radius:10px;color:#fff}.g{background:#16a34a}.o{background:#b45309}.r{background:#b91c1c}
table{width:100%;border-collapse:collapse;margin-top:12px}th,td{border:1px solid #475569;padding:6px;text-align:center}.del{padding:6px 10px}
</style></head><body><div class=box>
<div class='mode-btn' id='gearBtn' onclick='toggleSettings()'>⚙️</div>
<div id='overlay' style='display:none;z-index:999;position:fixed;inset:0;background:rgba(0,0,0,.45);align-items:center;justify-content:center;z-index:999'>
<div style='background:var(--box);width:min(92vw,430px);border-radius:24px;padding:20px'>
<div style='font-size:30px;font-weight:bold'>⚙️ Pengaturan</div><hr>
<div style='color:#1da1f2;font-weight:bold;margin:16px 0'>1. Tampilan</div>
<div style='margin-bottom:10px'>Mode Tema</div>
<div style='display:flex;background:#334155;border-radius:16px;padding:4px'>
<button id='bDark' onclick='applyTheme(false)' style='flex:1;padding:14px;border:0;border-radius:12px'>🌙 Gelap</button>
<button id='bLight' onclick='applyTheme(true)' style='flex:1;padding:14px;border:0;border-radius:12px'>☀️ Terang</button>
</div>
<hr>
<div style='color:#1da1f2;font-weight:bold;margin:16px 0'>2. Background</div>
<select id='bgSelect' onchange='applyBackground(this.value)' style='width:100%;padding:12px;border-radius:10px;background:var(--input);color:var(--text)'>
<option value=''>Default</option>
<option value='background/Foto_V1.jpg'>Foto 1</option>
<option value='background/Foto_V2.jpg'>Foto 2</option>
<option value='background/Foto_V3.jpg'>Foto 3</option>
<option value='background/Foto_V4.jpg'>Foto 4</option>
<option value='background/Foto_V5.jpg'>Foto 5</option>
</select>
</div></div><h2 style="text-align:center;margin-bottom:50px;">KALKULATOR</h2>
<div class=grid><input id=j1 placeholder=Jam><input id=m1 placeholder=Menit><input id=p1 placeholder=%></div><br>
<div class=grid><input id=j2 placeholder=Jam><input id=m2 placeholder=Menit><input id=p2 placeholder=%></div>
<button class=big onclick='tambah()'>🧮 Hitung</button>
<div class=row>
<button class=g onclick='backup()'>📦 Cadangan</button>
<button class=o onclick='file.click()'>📂 Pulihkan</button>
<button class=r onclick='hapusSemua()'>🗑 Hapus Semua</button>
</div>
<input id=file type=file hidden accept=.json onchange='restore(event)'>
<table><thead><tr><th>🕒</th><th>🔋</th><th>🗑️</th></tr></thead><tbody id=tb></tbody></table>
</div>
<script>
let data=JSON.parse(localStorage.getItem('riwayat')||'[]');
function simpan(){localStorage.setItem('riwayat',JSON.stringify(data))}
function render(){tb.innerHTML='';if(!data.length){tb.innerHTML='<tr><td colspan=3>Belum ada riwayat</td></tr>';return;}
data.forEach((x,i)=>tb.innerHTML+=`<tr><td>${x.j} j, ${x.m} mnt</td><td>${x.p}%</td><td><button class="del r" onclick="hapusSatu(${i})">🗑</button></td></tr>`);}
function tambah(){let j=(+j1.value||0)+(+j2.value||0),m=(+m1.value||0)+(+m2.value||0),p=(+p1.value||0)+(+p2.value||0);j+=Math.floor(m/60);m%=60;data.push({j,m,p});simpan();
const btn=document.getElementById('modeBtn');
if(localStorage.getItem('mode')==='light'){document.body.classList.add('light');btn.textContent='☀️';}
function toggleMode(){document.body.classList.toggle('light');let l=document.body.classList.contains('light');localStorage.setItem('mode',l?'light':'dark');btn.textContent=l?'☀️':'🌙';}
function toggleSettings(){overlay.style.display=overlay.style.display==='flex'?'none':'flex';syncBtns();}
function applyTheme(light){document.body.classList.toggle('light',light);localStorage.setItem('mode',light?'light':'dark');syncBtns();}
function syncBtns(){let l=document.body.classList.contains('light');bLight.style.background=l?'#1da1f2':'transparent';bLight.style.color=l?'#fff':'';
bDark.style.background=!l?'#1da1f2':'transparent';bDark.style.color=!l?'#fff':'';}
if(localStorage.getItem('mode')==='light')document.body.classList.add('light');
render();}
function hapusSatu(i){data.splice(i,1);simpan();

function applyBackground(path){
 if(path){
   document.body.style.backgroundImage="url('"+path+"')";
   document.body.style.backgroundSize="cover";
   document.body.style.backgroundPosition="center";
   document.body.style.backgroundAttachment="fixed";
 }else{
   document.body.style.backgroundImage="none";
 }
 localStorage.setItem("bgPath",path);
}
window.addEventListener("load",()=>{
 const p=localStorage.getItem("bgPath")||"";
 if(p) applyBackground(p);
 const s=document.getElementById("bgSelect");
 if(s) s.value=p;
});

</script></body></html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catat Pemakaian HP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#071020;
    color:#fff;
}

header{
    text-align:center;
    padding:50px 20px 35px;
}

header h1{
    font-size:38px;
    color:#0d6efd;
    font-weight:bold;
}

header p{
    margin-top:12px;
    color:#9aa6b2;
    font-size:18px;
}

.container{
    width:92%;
    max-width:700px;
    margin:auto;
}

.card{
    background:#162234;
    border:2px solid rgba(255,255,255,.15);
    border-radius:28px;
    padding:30px;
    margin-bottom:35px;
    transition:.25s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:#4b8cff;
}

.icon{
    font-size:60px;
    margin-bottom:20px;
}

.blue{
    color:#0d6efd;
}

.yellow{
    color:#f0a500;
}

.card h2{
    font-size:40px;
    margin-bottom:15px;
}

.card p{
    color:#9aa6b2;
    font-size:20px;
    line-height:1.6;
}

.open{
    display:inline-block;
    margin-top:28px;
    text-decoration:none;
    font-size:24px;
    font-weight:bold;
}

.open.blue{
    color:#5aa9ff;
}

.open.yellow{
    color:#f0a500;
}

footer{
    text-align:center;
    color:#8d98a5;
    font-size:18px;
    padding:35px 20px;
}
</style>

</head>
<body>

<header>
    <h1>📱 Catat Pemakaian HP</h1>
    <p>Pilih aplikasi yang ingin kamu gunakan</p>
</header>

<div class="container">

    <div class="card">
        <div class="icon">🎵</div>

        <h2 class="blue">TikTok Biasa</h2>

        <p>
            Catatan pemakaian untuk aplikasi TikTok versi reguler.
        </p>

        <a class="open blue" href="Tiktok-Biasa.html">
            Buka →
        </a>
    </div>

    <div class="card">

        <div class="icon">⚡</div>

        <h2 class="yellow">TikTok Lite</h2>

        <p>
            Catatan pemakaian untuk aplikasi TikTok Lite.
        </p>

        <a class="open yellow" href="Tiktok-Lite.html">
            Buka →
        </a>

    </div>

</div>

<footer>
    Data setiap aplikasi disimpan terpisah di perangkatmu.
</footer>

</body>
</html>
